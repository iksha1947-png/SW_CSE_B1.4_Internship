<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tags</title>
    <style>
        .responsive-image {
            max-width:100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <!-- src: source alt: alternate text | Self-closing tag -->
    <img src="11.png.png" alt="image 1">
    <img src="12.png.png" alt="image 2"> 
    
    <!-- Common attributes & variations -->
     <!-- Width & height -->
    <img src="11.png.png" alt="image 1" width="200" height="100"> 
    <!-- Tooltip -->
    <img src="11.png.png" alt="image 1" title="Image of a Dog"> 
    <!-- Style -->
    <img src="11.png.png" alt="image 1" 
    style="width:200px; height:100px; border-radius:10%; border:2px solid #cd2323;"> 

    <!-- Image formats -->
    <!-- 1.Jpg 2.PNG 3.GIF 4.SVG 5.webp -->

    <!-- Responsive image via CSS -->
    <img src="11.png.png" alt="image 1" class="responsive-image"> 
</body>
</html>
