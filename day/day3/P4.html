<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tag</title>
</head>
<body>
     <p>Video Tag</p>
    <!-- Video format: mp4/webM/ogg -->
    <video src="sample-5s-360p.mp4.mp4" controls>
       
    </video>

    <video src="sample-5s-360p.mp4.mp4" controls>
       
    </video>
    <!-- W/o controls the video appears but the user cannot play it. 
     JavaScript can start playing the video -->

    <!-- Width & Height  -->
    <video src="sample-5s-360p.mp4.mp4" width="880" height="520" controls>
        
    </video>

    <!-- autoplay -->
    <video src="sample-5s-360p.mp4.mp4" width="880" height="520" autoplay controls>
        
    </video>

    <!-- muted -->
    <video src="sample-5s-360p.mp4.mp4" width="880" height="520" autoplay muted controls>
        
    </video>

    <!-- loop -->
     <video src="sample-5s-360p.mp4.mp4" width="880" height="520" loop autoplay controls>
        
    </video>

    <!-- poster -->
    <video src="sample-5s-360p.mp4.mp4" width="880" height="520" poster="video.png" muted autoplay controls>
       
    </video>

    <!-- Preload -->
    <!-- none: Don't preload; load only when user starts playing -->
    <!-- metadata: Load only information like duration, dimensions etc -->
    <!-- auto: Automatic: Browser load video immediately -->
    <video src="sample-5s-360p.mp4.mp4" width="880" height="520" poster="video.png" muted 
     preload="none" controls>
        
    </video>
</body>
</html>
